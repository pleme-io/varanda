<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>quero.cloud — saguão</title>
    <link data-trunk rel="rust" data-bin="varanda" data-type="main" />
    <link data-trunk rel="copy-dir" href="public" />
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --fg-dim: #999;
        --accent: #e5b870;
        --tile-bg: #1a1a1a;
        --tile-bg-hover: #252525;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
      .varanda-root { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
      .varanda-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 1rem; }
      .varanda-header h1 { font-size: 1.5rem; font-weight: 500; }
      .varanda-user { color: var(--fg-dim); font-size: 0.9rem; }
      .varanda-empty { color: var(--fg-dim); padding: 3rem 0; text-align: center; }
      .varanda-group { margin-bottom: 2.5rem; }
      .varanda-group h2 { font-size: 1rem; color: var(--fg-dim); font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
      .varanda-tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
      .varanda-tile { background: var(--tile-bg); padding: 1.25rem; border-radius: 8px; text-decoration: none; color: var(--fg); transition: background 120ms ease; display: flex; flex-direction: column; gap: 0.5rem; }
      .varanda-tile:hover { background: var(--tile-bg-hover); }
      .varanda-tile-name { font-size: 1rem; font-weight: 600; }
      .varanda-tile-desc { font-size: 0.85rem; color: var(--fg-dim); }
      .varanda-tile-host { font-size: 0.75rem; color: var(--fg-dim); font-family: ui-monospace, monospace; margin-top: auto; }
    </style>
  </head>
  <body>
    <noscript>varanda requires JavaScript + WebAssembly.</noscript>
  </body>
</html>
