# Build varanda's WASM bundle and deploy to the Cloudflare Pages
# project named `varanda` on every push to main.
#
# The Pages project itself + its custom domains (quero.cloud,
# www.quero.cloud, bristol.quero.cloud, rio.bristol.quero.cloud)
# are owned by pangea-architectures' workspaces/cloudflare-pleme/
# domains/quero.cloud.yaml under `pages_apps[varanda]`. Once that
# template is reconciled by pangea-operator on rio (saguão front
# door), this workflow ships the bundle that fills it.
#
# Build: nix builds the wasm bundle (consuming ishou tokens via the
# `ishou` flake input). Output is dist/index.html + .wasm + .js.
#
# Deploy: wrangler pages deploy dist/ --project-name=varanda. Auth
# via repo secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
# (see README for one-time provisioning).

name: pages-deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build WASM + deploy to Cloudflare Pages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build varanda bundle (renders ishou tokens + trunk build)
        run: |
          nix build .#default --print-build-logs
          mkdir -p dist
          cp -r result/* dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=varanda --branch=main
